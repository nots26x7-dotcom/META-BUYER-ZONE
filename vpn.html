<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VPN ZONE</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    
    <style>
        :root{
            --bg:#eef2f6;
            --bg-2:#e8edf3;
            --card:rgba(255,255,255,.94);
            --card-2:rgba(248,250,252,.96);
            --line:rgba(97,113,132,.13);
            --line-2:rgba(97,113,132,.20);
            --text:#233142;
            --muted:#6f7d90;
            --blue:#5f7ea6;
            --blue-2:#46627f;
            --blue-soft:#eaf2ff;
            --green:#10a779;
            --green-soft:#e8fff5;
            --red:#cc6f6f;
            --red-soft:#fff0f0;
            --orange:#d3a66c;
            --shadow:0 12px 28px rgba(35,49,66,.08);
            --shadow-soft:0 8px 18px rgba(35,49,66,.06);
            --radius-xl:28px;
            --radius-lg:22px;
            --radius-md:16px;
            --grad-main:linear-gradient(135deg,#5f7ea6,#7fa0c2);
        }

        *{
            font-family:'Plus Jakarta Sans','Inter',system-ui,sans-serif;
            -webkit-tap-highlight-color:transparent;
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{ scroll-behavior:smooth; }

        body{
            min-height:100vh;
            color:var(--text);
            padding-bottom:106px;
            overflow-x:hidden;
            background:linear-gradient(180deg,#f7f9fc 0%,#eef2f6 45%,#e7ecf2 100%);
            position:relative;
        }

        body::before,
        body::after{
            content:"";
            position:fixed;
            width:230px;
            height:230px;
            border-radius:999px;
            filter:blur(64px);
            opacity:.28;
            z-index:-2;
            pointer-events:none;
            animation:floatBlob 10s ease-in-out infinite;
        }

        body::before{ top:-54px; left:-56px; background:rgba(143,161,183,.38); }
        body::after{ right:-54px; bottom:90px; background:rgba(178,187,197,.42); animation-delay:-4s; }

        @keyframes floatBlob{
            0%,100%{ transform:translate(0,0) scale(1); }
            50%{ transform:translate(12px,18px) scale(1.08); }
        }
        @keyframes spin{ to{ transform:rotate(360deg); } }
        @keyframes fadeUp{
            from{ opacity:0; transform:translateY(14px); }
            to{ opacity:1; transform:translateY(0); }
        }
        @keyframes slideUp{
            from{ transform:translateY(100%); opacity:0; }
            to{ transform:translateY(0); opacity:1; }
        }
        @keyframes shimmer{
            0%{ background-position:-200% 0; }
            100%{ background-position:200% 0; }
        }
        @keyframes pulseGlow{
            0%,100%{ box-shadow:0 0 0 0 rgba(95,126,166,.22),0 15px 35px rgba(35,49,66,.10); }
            50%{ box-shadow:0 0 0 12px rgba(95,126,166,0),0 18px 44px rgba(35,49,66,.14); }
        }
        @keyframes badgeFlow{
            0%{ transform:translateX(-8px); opacity:.72; }
            50%{ transform:translateX(0); opacity:1; }
            100%{ transform:translateX(-8px); opacity:.72; }
        }

        .hidden{ display:none !important; }
        .bg-grid{ display:none; }

        .max-w-md{
            max-width:580px !important;
            margin:0 auto;
            position:relative;
        }

        header{
            padding:14px 13px 8px !important;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
        }

        .header-brand{
            position:relative;
            display:flex;
            align-items:center;
            gap:4px;
            margin:0;
            color:var(--text);
            font-size:19px !important;
            line-height:1.05;
            font-weight:900 !important;
            letter-spacing:-.05em !important;
            font-style:normal !important;
        }

        .brand-accent{
            color:var(--blue);
            background:none;
            -webkit-background-clip:initial;
            background-clip:initial;
        }

        main{
            padding:8px 13px 0 !important;
            display:grid;
            gap:12px;
        }

        #loading-screen{
            position:fixed;
            inset:0;
            background:radial-gradient(circle at center,#ffffff 0%,#f4f7fb 52%,#e7ecf2 100%);
            z-index:9999;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            transition:opacity .45s ease;
        }

        #loading-screen::before,
        #loading-screen::after{
            content:"";
            position:absolute;
            border-radius:999px;
            filter:blur(58px);
            pointer-events:none;
        }

        #loading-screen::before{
            width:230px;
            height:230px;
            top:13%;
            left:9%;
            background:rgba(143,161,183,.24);
            animation:floatBlob 9s ease-in-out infinite;
        }

        #loading-screen::after{
            width:220px;
            height:220px;
            right:8%;
            bottom:16%;
            background:rgba(95,126,166,.18);
            animation:floatBlob 11s ease-in-out infinite reverse;
        }

        .loader-ring{
            width:126px;
            height:126px;
            border:0 !important;
            border-radius:32px;
            position:relative;
            display:grid;
            place-items:center;
            background:linear-gradient(180deg,#ffffff,#f2f5f8);
            border:1px solid var(--line) !important;
            box-shadow:var(--shadow);
            animation:pulseGlow 2s ease-in-out infinite;
            z-index:1;
        }

        .loader-ring::before,
        .loader-ring::after{
            content:"";
            position:absolute;
            inset:-10px;
            border-radius:38px;
            border:2px solid transparent;
        }

        .loader-ring::before{
            border-top-color:#8fa1b7;
            border-right-color:#8fa1b7;
            animation:spin 1.35s linear infinite;
        }

        .loader-ring::after{
            inset:-19px;
            border-bottom-color:#c4ceda;
            border-left-color:#c4ceda;
            animation:spin 1.8s linear infinite reverse;
        }

        .loader-ring + p{
            margin-top:30px !important;
            color:var(--text) !important;
            font-size:20px !important;
            font-weight:900 !important;
            letter-spacing:.09em !important;
            text-align:center;
            position:relative;
            z-index:1;
        }

        .loader-ring + p::after{
            content:"";
            display:block;
            width:220px;
            height:6px;
            margin:17px auto 0;
            border-radius:999px;
            background:linear-gradient(90deg,#8fa1b7,#c4ceda,#8fa1b7);
            background-size:200% 100%;
            animation:shimmer 1.5s linear infinite;
        }

        .glass,
        .card{
            background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(248,250,252,.92));
            border:1px solid var(--line);
            box-shadow:var(--shadow);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border-radius:20px;
            position:relative;
            overflow:hidden;
            color:var(--text);
        }

        .card{
            padding:13px;
            animation:fadeUp .32s ease both;
        }

        .card::before,
        .sheet::before,
        #user-profile-card::before{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(135deg,rgba(255,255,255,.80),transparent 48%);
            pointer-events:none;
        }

        .glow-border::after{
            content:"";
            position:absolute;
            inset:0;
            border-radius:inherit;
            border:1px solid rgba(95,126,166,.10);
            pointer-events:none;
        }

        #user-profile-card{
            border:none;
            padding:15px !important;
            margin:0;
            background:linear-gradient(135deg,#ffffff,#f2f5f8,#e7edf4);
            color:var(--text) !important;
            box-shadow:0 14px 28px rgba(35,49,66,.08);
        }

        #user-profile-card *,
        #user-profile-card.text-white{ color:var(--text) !important; }

        #user-profile-card::after{
            content:"";
            position:absolute;
            width:128px;
            height:128px;
            top:-36px;
            right:-30px;
            border-radius:999px;
            background:rgba(130,145,162,.10);
            filter:blur(2px);
            animation:none;
        }

        .soft-badge,
        .price-chip{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:7px 10px;
            border-radius:14px;
            background:rgba(255,255,255,.80);
            border:1px solid rgba(97,113,132,.12);
            color:var(--muted) !important;
            font-size:9px;
            font-weight:900;
            letter-spacing:.08em;
            box-shadow:0 6px 14px rgba(35,49,66,.05);
        }

        .status-dot{
            width:7px;
            height:7px;
            border-radius:999px;
            background:var(--green);
            box-shadow:0 0 0 4px rgba(16,167,121,.10);
        }

        #u-pic{
            width:52px !important;
            height:52px !important;
            border-radius:16px !important;
            object-fit:cover;
            border:1px solid rgba(97,113,132,.12) !important;
            box-shadow:0 8px 16px rgba(35,49,66,.08) !important;
        }

        #u-nickname{
            font-size:16px !important;
            font-weight:900 !important;
            line-height:1.2;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            max-width:190px;
        }

        #display-uid{
            color:var(--muted) !important;
            font-size:10px !important;
            font-weight:800 !important;
            letter-spacing:.08em !important;
        }

        #store-page,
        #history-page{ display:grid; gap:10px; }
        #store-page.hidden,
        #history-page.hidden{ display:none !important; }

        .store-card{
            min-height:76px;
            cursor:pointer;
            transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;
        }

        .store-card:hover,
        .store-card:active{
            transform:translateY(-1px) scale(.995);
            border-color:rgba(95,126,166,.24);
            box-shadow:0 14px 30px rgba(35,49,66,.10);
        }

        .vpn-img{
            width:46px;
            height:46px;
            border-radius:15px;
            object-fit:cover;
            background:#fff;
            border:1px solid rgba(97,113,132,.12);
            box-shadow:0 8px 16px rgba(35,49,66,.07);
        }

        .store-card b{ font-size:15px; font-weight:900; color:var(--text); }
        .store-card span.text-\[10px\],
        .text-slate-400,
        .text-slate-500{ color:var(--muted) !important; }

        .online-badge,
        .offline-badge{
            min-width:72px;
            text-align:center;
            border-radius:999px !important;
            padding:7px 10px !important;
            font-size:9px !important;
            font-weight:900 !important;
            letter-spacing:.07em;
        }

        .online-badge{
            color:#047857 !important;
            background:rgba(220,252,231,.92) !important;
            border:1px solid rgba(52,211,153,.25);
        }

        .offline-badge{
            color:#b91c1c !important;
            background:rgba(254,226,226,.92) !important;
            border:1px solid rgba(248,113,113,.25);
        }

        .disabled-card{
            opacity:.46;
            pointer-events:none;
            filter:saturate(.4);
            box-shadow:none;
        }

        .section-title{
            font-size:11px;
            text-transform:uppercase;
            letter-spacing:.12em;
            color:var(--muted);
            font-weight:900;
        }

        .btn-p{
            width:100%;
            padding:14px 15px;
            border:none;
            border-radius:16px;
            font-weight:900;
            font-size:13px;
            color:#fff !important;
            background:linear-gradient(135deg,#5f7ea6,#46627f);
            background-size:200% 100%;
            box-shadow:0 14px 28px rgba(95,126,166,.22);
            transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;
            position:relative;
            overflow:hidden;
            cursor:pointer;
            animation:shimmer 5.5s linear infinite;
        }

        .btn-p:hover,
        .btn-p:active{ transform:translateY(-1px); filter:brightness(1.02); }

        .btn-p::before{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.26) 50%,transparent 78%);
            transform:translateX(-130%);
            animation:btnShine 3.8s ease-in-out infinite;
        }

        @keyframes btnShine{
            0%,70%,100%{ transform:translateX(-130%); }
            85%{ transform:translateX(130%); }
        }

        .btn-reject{
            width:100%;
            padding:12px;
            border-radius:14px;
            font-weight:900;
            font-size:12px;
            border:1px solid rgba(204,111,111,.22);
            background:var(--red-soft);
            color:#b91c1c !important;
            transition:transform .18s ease,background .18s ease;
        }

        .btn-reject:hover{ transform:translateY(-1px); background:#ffe6e6; }

        .mini-icon-btn{
            width:42px;
            height:42px;
            min-width:42px;
            display:grid;
            place-items:center;
            background:linear-gradient(180deg,#ffffff,#f2f5f8);
            border:1px solid var(--line);
            border-radius:14px;
            color:var(--blue-2) !important;
            box-shadow:var(--shadow-soft);
            cursor:pointer;
        }

        #p-count-badge{
            background:#cc6f6f !important;
            color:#fff !important;
            box-shadow:0 8px 16px rgba(204,111,111,.22);
        }

        .nav-shell{
            position:fixed;
            left:50%;
            transform:translateX(-50%);
            bottom:14px;
            width:calc(100% - 24px);
            max-width:552px;
            height:70px !important;
            display:flex;
            align-items:center;
            justify-content:space-around;
            padding:7px;
            border-radius:30px;
            background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(247,249,251,.90));
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid var(--line);
            box-shadow:0 12px 28px rgba(35,49,66,.10);
            z-index:1000;
            overflow:hidden;
        }

        .nav-shell::before{ display:none; }

        .nav-btn{
            flex:1;
            height:56px;
            border:none;
            background:transparent;
            color:#8fa1b7 !important;
            border-radius:18px;
            font-weight:900 !important;
            font-size:10px !important;
            transition:all .2s ease;
        }

        .nav-btn i{
            font-size:20px !important;
            color:inherit !important;
            background:none !important;
            -webkit-background-clip:initial !important;
            background-clip:initial !important;
        }

        .nav-btn.active,
        .nav-btn.text-indigo-600{
            color:#fff !important;
            background:linear-gradient(135deg,#5f7ea6,#46627f);
            box-shadow:0 12px 24px rgba(95,126,166,.22);
        }

        .modal{
            position:fixed;
            inset:0;
            background:rgba(245,248,252,.72);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            z-index:6000;
            display:none;
            align-items:flex-end;
            justify-content:center;
            padding:0 10px;
        }

        .sheet{
            width:100%;
            max-width:560px;
            max-height:90vh;
            overflow-y:auto;
            overflow-x:hidden;
            padding:22px 17px 22px;
            border-radius:30px 30px 0 0;
            background:linear-gradient(180deg,rgba(255,255,255,.99),rgba(246,248,251,.98));
            border:1px solid var(--line);
            box-shadow:0 -18px 40px rgba(35,49,66,.10);
            animation:slideUp .26s ease;
            color:var(--text);
            position:relative;
        }

        .sheet h3,
        .sheet h4{ color:var(--text); }

        .pay-choice{
            background:rgba(255,255,255,.96);
            border:1px solid var(--line);
            border-radius:16px;
            color:var(--text) !important;
            box-shadow:var(--shadow-soft);
            transition:transform .18s ease,border-color .18s ease,background .18s ease;
            cursor:pointer;
        }

        .pay-choice:hover,
        .pay-choice:active{
            transform:translateY(-1px);
            border-color:rgba(95,126,166,.28);
            background:#fff;
        }

        .adm-mini-input,
        #trx-id{
            width:100%;
            background:rgba(255,255,255,.98);
            border:1px solid var(--line);
            border-radius:15px;
            padding:13px 13px;
            font-size:12px;
            font-weight:800;
            outline:none;
            color:var(--text);
            transition:border-color .18s ease,box-shadow .18s ease,background .18s ease;
            box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
        }

        .adm-mini-input::placeholder,
        #trx-id::placeholder{ color:#8c9aac; }

        .adm-mini-input:focus,
        #trx-id:focus{
            border-color:rgba(95,126,166,.42);
            box-shadow:0 0 0 4px rgba(95,126,166,.10);
            background:#fff;
        }

        select.adm-mini-input{ appearance:none; }

        .acc-box{
            background:rgba(255,255,255,.98);
            border:1px dashed rgba(95,126,166,.24);
            border-radius:15px;
            padding:11px 13px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            margin-top:8px;
            transition:background .18s ease,border-color .18s ease,transform .18s ease;
        }

        .acc-box:hover{ background:#fff; border-color:rgba(95,126,166,.38); transform:translateY(-1px); }

        .acc-label{
            font-size:9px;
            font-weight:900;
            color:var(--muted);
            text-transform:uppercase;
            letter-spacing:.08em;
        }

        .acc-value{
            font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
            font-size:11px;
            font-weight:800;
            color:var(--text);
            word-break:break-word;
        }

        #help-page{
            text-align:center;
            padding:32px 18px !important;
        }

        #help-page .w-20{
            background:var(--blue-soft) !important;
            border:1px solid rgba(95,126,166,.14) !important;
        }

        #help-page i{ color:var(--blue) !important; }

        #admin-panel{
            background:linear-gradient(180deg,#f7f9fc 0%,#eef2f6 58%,#e7ecf2 100%);
            color:var(--text);
        }

        .admin-topbar{
            background:rgba(247,249,252,.88);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border-bottom:1px solid var(--line);
            box-shadow:0 6px 18px rgba(35,49,66,.04);
        }

        #admin-panel > .p-6{ padding:14px 14px 10px !important; }
        #admin-panel > .p-4{ padding:8px 13px 12px !important; }
        #admin-panel > .p-5{ padding:13px 13px 106px !important; }

        #admin-panel h2{
            color:var(--text);
            font-size:21px !important;
            font-weight:900 !important;
        }

        .adm-nav{
            display:grid;
            grid-template-columns:repeat(4,minmax(94px,1fr));
            gap:7px;
            overflow-x:auto;
            padding:6px;
            border-radius:21px;
            background:rgba(255,255,255,.92);
            border:1px solid var(--line);
            box-shadow:0 8px 20px rgba(35,49,66,.05);
            margin:0;
        }

        .adm-tab{
            min-width:94px;
            padding:11px 8px;
            border:none;
            border-radius:16px;
            text-align:center;
            white-space:nowrap;
            font-size:10px;
            font-weight:900;
            color:var(--muted);
            background:transparent;
            transition:all .18s ease;
        }

        .adm-tab-active{
            background:linear-gradient(135deg,#6f8bad,#8ea4bc);
            color:#fff !important;
            box-shadow:0 10px 20px rgba(95,126,166,.20);
        }

        .adm-content{ display:grid; gap:12px; }
        .adm-content.hidden{ display:none !important; }

        .switch{
            position:relative;
            display:inline-block;
            width:44px;
            height:26px;
            flex-shrink:0;
        }

        .switch input{ opacity:0; width:0; height:0; }

        .slider{
            position:absolute;
            cursor:pointer;
            inset:0;
            background:#d5dde7;
            transition:.28s;
            border-radius:999px;
            border:1px solid rgba(97,113,132,.12);
        }

        .slider:before{
            position:absolute;
            content:"";
            height:20px;
            width:20px;
            left:2px;
            bottom:2px;
            background:#fff;
            transition:.28s;
            border-radius:50%;
            box-shadow:0 4px 12px rgba(35,49,66,.18);
        }

        input:checked + .slider{ background:linear-gradient(135deg,#5f7ea6,#10a779); }
        input:checked + .slider:before{ transform:translateX(18px); }

        .bg-slate-50,
        .bg-indigo-50,
        .bg-white,
        .bg-white\/80{
            background:rgba(255,255,255,.96) !important;
        }

        .border,
        .border-t,
        .border-b{ border-color:var(--line) !important; }

        .text-indigo-400,
        .text-indigo-500,
        .text-indigo-600,
        .text-indigo-700{ color:var(--blue) !important; }
        .text-rose-300,
        .text-rose-400,
        .text-rose-500{ color:var(--red) !important; }

        hr{
            border:none;
            border-top:1px solid var(--line);
        }

        #target-price,
        #active-num{ color:var(--blue-2) !important; }

        @media (min-width:720px){
            .sheet{ border-radius:32px; margin-bottom:14px; }
        }

        @media (max-width:420px){
            .card{ border-radius:19px; }
            .sheet{ padding:21px 16px 20px; }
            header{ padding-top:12px !important; }
            .header-brand{ font-size:17px !important; }
            .nav-shell{ bottom:9px; width:calc(100% - 16px); }
            .adm-nav{ grid-template-columns:repeat(4,96px); }
        }
    

        /* === CLEAR CARD VISIBILITY FIX - WHITE THEME === */
        :root{
            --bg:#f1f5f9;
            --bg-2:#e8eef6;
            --card:#ffffff;
            --card-2:#f8fafc;
            --line:rgba(15,23,42,.11);
            --line-2:rgba(15,23,42,.18);
            --text:#0f172a;

        /* === MOBILE-FIRST TOP NOTIFICATION SYSTEM === */
        .notify-stack{
            position:fixed;
            left:50%;
            right:auto;
            top:calc(10px + env(safe-area-inset-top, 0px));
            bottom:auto;
            transform:translateX(-50%);
            z-index:10000;
            display:grid;
            gap:6px;
            pointer-events:none;
            width:calc(100vw - 18px);
            max-width:390px;
            margin:0;
        }
        .app-toast{
            pointer-events:auto;
            display:flex;
            align-items:center;
            gap:7px;
            width:100%;
            min-height:42px;
            padding:7px 8px 7px 9px;
            border-radius:14px;
            background:rgba(255,255,255,.99);
            border:1px solid rgba(97,113,132,.16);
            box-shadow:0 8px 22px rgba(35,49,66,.16);
            backdrop-filter:blur(14px);
            -webkit-backdrop-filter:blur(14px);
            transform:translateY(-120%) scale(.98);
            opacity:0;
            overflow:hidden;
            animation:toastIn .26s cubic-bezier(.2,.85,.2,1) forwards;
        }
        .app-toast.toast-hide{ animation:toastOut .22s ease forwards; }
        .app-toast::before{
            content:"";
            position:absolute;
            inset:0 auto 0 0;
            width:3px;
            background:linear-gradient(180deg,#5f7ea6,#2563eb);
        }
        .app-toast::after{
            content:"";
            position:absolute;
            left:0;
            right:0;
            bottom:0;
            height:2px;
            background:linear-gradient(90deg,rgba(37,99,235,.55),rgba(95,126,166,.20));
            transform-origin:left;
            animation:toastTimer 2.6s linear forwards;
        }
        .app-toast-icon{
            width:27px;
            height:27px;
            min-width:27px;
            border-radius:9px;
            display:grid;
            place-items:center;
            color:#fff;
            font-size:11px;
            background:linear-gradient(135deg,#5f7ea6,#46627f);
            box-shadow:0 6px 12px rgba(95,126,166,.18);
        }
        .app-toast-content{
            min-width:0;
            flex:1;
            padding-right:0;
        }
        .app-toast-title{
            display:block;
            font-size:10.5px;
            line-height:1.12;
            font-weight:900;
            color:#233142;
            margin:0;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .app-toast-text{
            display:block;
            font-size:8.8px;
            line-height:1.22;
            color:#6f7d90;
            font-weight:700;
            margin-top:2px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .app-toast-close{
            width:18px;
            height:18px;
            min-width:18px;
            border:none;
            border-radius:7px;
            background:#f1f5f9;
            color:#64748b;
            font-size:10px;
            font-weight:900;
            display:grid;
            place-items:center;
            cursor:pointer;
            line-height:1;
        }
        .app-toast.success::before{ background:linear-gradient(180deg,#10a779,#34d399); }
        .app-toast.success .app-toast-icon{ background:linear-gradient(135deg,#10a779,#34d399); }
        .app-toast.error::before{ background:linear-gradient(180deg,#cc6f6f,#ef4444); }
        .app-toast.error .app-toast-icon{ background:linear-gradient(135deg,#cc6f6f,#ef4444); }
        .app-toast.warning::before{ background:linear-gradient(180deg,#d3a66c,#f59e0b); }
        .app-toast.warning .app-toast-icon{ background:linear-gradient(135deg,#d3a66c,#f59e0b); }
        .app-toast.info::before{ background:linear-gradient(180deg,#5f7ea6,#2563eb); }
        .app-toast.info .app-toast-icon{ background:linear-gradient(135deg,#5f7ea6,#2563eb); }
        .app-toast.welcome::before{ background:linear-gradient(180deg,#2563eb,#10a779); }
        .app-toast.welcome .app-toast-icon{ background:linear-gradient(135deg,#2563eb,#10a779); }
        @keyframes toastIn{
            from{ transform:translateY(-120%) scale(.98); opacity:0; }
            to{ transform:translateY(0) scale(1); opacity:1; }
        }
        @keyframes toastOut{
            from{ transform:translateY(0) scale(1); opacity:1; }
            to{ transform:translateY(-120%) scale(.98); opacity:0; }
        }
        @keyframes toastTimer{
            from{ transform:scaleX(1); }
            to{ transform:scaleX(0); }
        }
        @media (max-width:360px){
            .notify-stack{ width:calc(100vw - 14px); top:calc(8px + env(safe-area-inset-top, 0px)); }
            .app-toast{ min-height:40px; padding:6px 7px 6px 8px; gap:6px; }
            .app-toast-icon{ width:25px; height:25px; min-width:25px; font-size:10px; }
            .app-toast-title{ font-size:10px; }
            .app-toast-text{ font-size:8.4px; }
        }

            try { if (navigator.vibrate) navigator.vibrate(vibe); } catch (e) {}
            if (options.sound !== false) playNotificationTone(icon);
            if (options.native !== false) showNativeNotification(title, text);
            showToastNotification(title, text, icon, options);

                    return;
                }
                if (Notification.permission === 'default') {

                updateNotificationUI();

        window.clearHistory = async () => {
            const clearBtn = document.querySelector('[onclick="clearHistory()"]');
            const ok = confirm("Are you sure you want to clear admin history? User order history will remain visible to users.");
            if (!ok) return;

            try {
                if (clearBtn) {
                    clearBtn.disabled = true;
                    clearBtn.dataset.originalText = clearBtn.innerHTML;
                    clearBtn.innerHTML = 'Clearing...';
                }

                const snap = await get(ref(db, 'orders'));
                const data = snap.val();

                if (!data) {
                    appNotify('No History Found', 'There is no admin history to clear.', 'info', { native:false });
                    return;
                }

                const idsToHide = Object.keys(data).filter(id => {
                    const order = data[id] || {};
                    const status = order.st;
                    return (status === 'Approved' || status === 'Rejected') && !order.adminHidden;
                });

                if (!idsToHide.length) {
                    appNotify('No History Found', 'There is no admin history to clear.', 'info', { native:false });
                    return;
                }

                await Promise.all(
                    idsToHide.map(id => update(ref(db, `orders/${id}`), {
                        adminHidden: true,
                        adminHiddenAt: new Date().toISOString(),
                        adminHiddenBy: `Admin ${UNAME} (${UID})`
                    }))
                );

                appNotify('History Cleared', 'Admin history cleared. User order history is unchanged.', 'success');
            } catch (error) {
                console.error('Failed to clear admin history:', error);
                appNotify('Clear Failed', 'Failed to clear admin history. Please try again.', 'error');
            } finally {
                if (clearBtn) {
                    clearBtn.disabled = false;
                    clearBtn.innerHTML = clearBtn.dataset.originalText || 'Clear History';
                }
            }
        };

        window.addVpn = () => {
            const n = document.getElementById('v-name').value.trim();
            if (n) {
                push(ref(db, 'vpns'), { name: n, status: "ON" }).then(() => appNotify('VPN Brand Added', `${n} has been added to store.`, 'success'));
                document.getElementById('v-name').value = '';
            } else {
                appNotify('VPN Name Required', 'Please enter VPN brand name.', 'warning', { native:false });
            }
        };

        window.delV = (id) => remove(ref(db, `vpns/${id}`))
            .then(() => appNotify('VPN Removed', 'VPN brand deleted from store.', 'warning'));

        window.delStockItem = (vid, skey) => remove(ref(db, `vpns/${vid}/stock/${skey}`))
            .then(() => appNotify('Stock Removed', 'Selected stock item deleted.', 'warning'));

        window.admTab = (t, btn = null) => {
            document.querySelectorAll('.adm-tab').forEach(b => b.classList.remove('adm-tab-active'));
            if (btn) btn.classList.add('adm-tab-active');

            const select = document.getElementById('admin-tab-select');
            if (select && select.value !== t) select.value = t;

            document.querySelectorAll('.adm-content').forEach(c => c.classList.add('hidden'));
            const target = document.getElementById('adm-' + t);
            if (target) target.classList.remove('hidden');

            const labels = { pending: 'Pending Orders', history: 'Order History', stock: 'Stock Management', settings: 'VPN Management' };
            appNotify('Admin Section Opened', (labels[t] || t) + ' opened.', 'info', { native:false, sound:false, duration:1800 });
        };

        window.openAdmin = () => {
            document.getElementById('admin-panel').classList.remove('hidden');
            appNotify('Admin Panel Opened', 'You can manage orders, stock and VPN settings.', 'info', { native:false, sound:false });
        };
        window.closeAdmin = () => {
            document.getElementById('admin-panel').classList.add('hidden');
            appNotify('Admin Panel Closed', 'Back to user dashboard.', 'info', { native:false, sound:false, duration:1800 });
        };

        window.copyText = (t) => {
            navigator.clipboard.writeText(t);
            safeHaptic('success');
            showToastNotification('Copied Successfully', String(t || ''), 'success', { duration:2200 });
        };

        window.onclick = (e) => {
            ['plan-modal', 'stock-select-modal', 'pay-modal'].forEach(id => {
                const modal = document.getElementById(id);
                if (e.target === modal) {
                    modal.style.display = 'none';
                    appNotify('Closed', 'Popup closed.', 'info', { native:false, sound:false, duration:1500 });
                }
            });
        };
    </script>
</body>
</html>
